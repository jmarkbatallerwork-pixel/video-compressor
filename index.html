<script type="module">
import { createFFmpeg, fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.9/dist/ffmpeg.min.js";

const ffmpeg = createFFmpeg({ log: true });

const btn = document.getElementById("btn");
const status = document.getElementById("status");
const downloadLink = document.getElementById("download");

btn.onclick = compress;

async function compress() {
    const file = document.getElementById('upload').files[0];

    if (!file) {
        alert("Please select a video file first.");
        return;
    }

    btn.disabled = true;
    downloadLink.style.display = 'none';
    status.innerText = "Loading FFmpeg...";

    try {
        if (!ffmpeg.isLoaded()) {
            await ffmpeg.load();
        }

        status.innerText = "Processing video...";
        await ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

        status.innerText = "Compressing...";
        await ffmpeg.run(
            '-i', 'input.mp4',
            '-vcodec', 'libx264',
            '-crf', '28',
            '-preset', 'fast',
            '-movflags', '+faststart',
            'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const url = URL.createObjectURL(
            new Blob([data.buffer], { type: 'video/mp4' })
        );

        const fileSizeMB = (data.length / (1024 * 1024)).toFixed(2);

        status.innerText = "Finished!";
        downloadLink.href = url;
        downloadLink.download = 'MPMG_Compressed.mp4';
        downloadLink.innerText = `Download (${fileSizeMB} MB)`;
        downloadLink.style.display = 'block';

    } catch (error) {
        console.error(error);
        status.innerText = "Error: " + error.message;
    } finally {
        btn.disabled = false;
    }
}
</script>
