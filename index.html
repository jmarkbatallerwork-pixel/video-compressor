<input type="file" id="upload" />
<button id="btn">Compress to 25MB</button>
<a id="download" style="display:none">Download</a>

<script type="module">
import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";
import { fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js";

const ffmpeg = new FFmpeg();

document.getElementById("btn").onclick = compress;

async function compress() {
  const file = document.getElementById('upload').files[0];
  if (!file) return;

  await ffmpeg.load();

  ffmpeg.writeFile('input.mp4', await fetchFile(file));

  await ffmpeg.exec([
    '-i', 'input.mp4',
    '-b:v', '1M',
    'output.mp4'
  ]);

  const data = await ffmpeg.readFile('output.mp4');

  const url = URL.createObjectURL(
    new Blob([data.buffer], { type: 'video/mp4' })
  );

  const link = document.getElementById('download');
  link.href = url;
  link.download = 'compressed.mp4';
  link.style.display = 'block';
}
</script>
