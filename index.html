<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPMG Video Compressor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        input[type="file"] { width: 100%; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-weight: 500; color: #7f8c8d; }
        #download { display: none; margin-top: 20px; text-align: center; padding: 12px; background-color: #27ae60; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        #download:hover { background-color: #219150; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Compressor</h2>
    <input type="file" id="upload" accept="video/*" />
    <button id="btn">Compress to 25MB</button>
    
    <div id="status">Ready</div>
    <a id="download">Download Compressed Video</a>
</div>

<script type="module">
    // Changed imports to unpkg to match the blob URLs and prevent conflicts
    import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";
    import { fetchFile, toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

    const ffmpeg = new FFmpeg();
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");
    const downloadLink = document.getElementById("download");

    btn.onclick = compress;

    async function compress() {
        const file = document.getElementById('upload').files[0];
        if (!file) {
            alert("Please select a video file first.");
            return;
        }

        btn.disabled = true;
        downloadLink.style.display = 'none';
        status.innerText = "Loading FFmpeg...";

        try {
            const CORE_URL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
            const FFMPEG_URL = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm';
            
            await ffmpeg.load({
                coreURL: await toBlobURL(`${CORE_URL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${CORE_URL}/ffmpeg-core.wasm`, 'application/wasm'),
                // THIS IS THE REAL FIX: classWorkerURL instead of workerURL
                classWorkerURL: await toBlobURL(`${FFMPEG_URL}/worker.js`, 'text/javascript'),
            });

            status.innerText = "Processing video...";
            await ffmpeg.writeFile('input.mp4', await fetchFile(file));

            status.innerText = "Compressing... (Stay on this page)";
            
            await ffmpeg.exec([
                '-i', 'input.mp4',
                '-vcodec', 'libx264',
                '-crf', '28',        
                '-b:v', '1.5M',      
                '-maxrate', '2M',
                '-bufsize', '4M',
                'output.mp4'
            ]);

            status.innerText = "Finished!";
            const data = await ffmpeg.readFile('output.mp4');

            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            const fileSizeMB = (data.length / (1024 * 1024)).toFixed(2);
            downloadLink.href = url;
            downloadLink.download = 'MPMG_Compressed.mp4';
            downloadLink.innerText = `Download (${fileSizeMB} MB)`;
            downloadLink.style.display = 'block';

        } catch (error) {
            console.error(error);
            status.innerText = "Error: " + error.message;
        } finally {
            btn.disabled = false;
        }
    }

    ffmpeg.on('log', ({ message }) => {
        console.log(message);
    });
</script>

</body>
</html>
